<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do You Love Me?</title>

<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background-color:#ffcccb;
    font-family:Arial, sans-serif;
    overflow:hidden;
}

.container{
    text-align:center;
}

.question{
    font-size:24px;
    font-weight:bold;
}

.btn{
    padding:10px 20px;
    font-size:18px;
    border:none;
    cursor:pointer;
    margin:10px;
    border-radius:5px;
}

.yes{
    background-color:#4CAF50;
    color:white;
}

.no{
    background-color:#f44336;
    color:white;
    position:fixed;
}

.love-message{
    font-size:22px;
    color:#d63384;
    font-weight:bold;
    display:none;
    text-align:center;
}

@keyframes blink{
    0%{opacity:1;}
    50%{opacity:0;}
    100%{opacity:1;}
}

.heart{
    position:absolute;
    width:20px;
    height:20px;
    background:red;
    clip-path: polygon(50% 0%,100% 35%,82% 100%,50% 75%,18% 100%,0% 35%);
    animation:blink 1s infinite;
}
</style>
</head>

<body>

<div class="container" id="questionBox">
    <p class="question">Do you love me?</p>
    <button class="btn yes" onclick="showLove()">Yes</button>
    <button class="btn no" id="noBtn" onmouseover="moveNoButton()">No</button>
</div>

<p class="love-message" id="loveMessage">
I knew you love me, I love you too! Will you go for a date? ❤️  
<br>Yours Manjit
</p>

<script>

function moveNoButton(){
    let noBtn = document.getElementById("noBtn");

    let maxX = window.innerWidth - noBtn.offsetWidth;
    let maxY = window.innerHeight - noBtn.offsetHeight;

    let x = Math.random() * maxX;
    let y = Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

function showLove(){
    document.getElementById("questionBox").style.display="none";

    let loveMessage = document.getElementById("loveMessage");
    loveMessage.style.display="block";

    createHearts();
}

function createHearts(){
    for(let i=0;i<40;i++){
        let heart=document.createElement("div");
        heart.className="heart";

        heart.style.left=Math.random()*window.innerWidth+"px";
        heart.style.top=Math.random()*window.innerHeight+"px";

        document.body.appendChild(heart);
    }
}

</script>

</body>
</html>
